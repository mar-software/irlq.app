<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>IRLQ — Quests for real life.</title>
    <meta
      name="description"
      content="IRLQ turns ordinary days into shared adventures. Pick a quest, do it IRL, and post the proof — no scores, no winners, just your crew."
    />
    <link rel="icon" type="image/svg+xml" href="/irlq-icon-black.svg" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="bg-icon" aria-hidden="true"></div>

    <main class="hero">
      <div class="hero-logo">
        <img src="/irlq-icon.svg" alt="IRLQ" />
      </div>

      <div class="hero-app">
        <div class="phones">
          <img class="phone phone-left" src="/phone-mockup.png" alt="" aria-hidden="true" />
          <img class="phone phone-right" src="/phone-mockup.png" alt="" aria-hidden="true" />
          <img class="phone phone-center" src="/phone-mockup.png" alt="Die IRLQ App auf dem iPhone" />
        </div>
        <a class="store-badge" href="#" aria-label="IRLQ im App Store laden">
          <img src="/app-store-badge.svg" alt="Laden im App Store" />
        </a>
      </div>
    </main>

    <site-footer></site-footer>
    <script type="module" src="/src/footer.js"></script>
  </body>
</html>
